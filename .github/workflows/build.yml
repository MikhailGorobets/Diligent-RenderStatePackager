name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_call:

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: windows-x64, os: windows-latest }
          - { name: macos-arm64, os: macos-14 }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Xcode 15's libc++ rejects Dawn's aggregate construct_at; 16+ (parenthesized aggregate init) builds it.
      - name: Select latest Xcode (macOS)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install build tools
        shell: bash
        run: python -m pip install --upgrade pip build ninja cmake

      - name: Cache Dawn (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ matrix.name }}-${{ hashFiles('DiligentCore/ThirdParty/dawn/CMakeLists.txt', '.gitmodules') }}

      - name: Build packager
        shell: bash
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target Diligent-RenderStatePackager

      - name: Stage binary + provenance
        shell: bash
        run: |
          BIN="$(find build \( -name 'Diligent-RenderStatePackager' -o -name 'Diligent-RenderStatePackager.exe' \) -type f | head -n1)"
          test -n "$BIN" || { echo "binary not found"; exit 1; }
          mkdir -p src/diligent_drsn_packager/bin
          cp "$BIN" src/diligent_drsn_packager/bin/
          git -C DiligentCore rev-parse HEAD > src/diligent_drsn_packager/diligentcore_sha.txt
          "$BIN" --help || true

      - name: Build wheel
        shell: bash
        run: python -m build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl

  linux:
    name: linux-x64
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    env:
      DRSP_WHEEL_PLAT: manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # X11/xcb headers: configure-time dependency of DiligentTools' NativeApp (configured, not built).
      - name: Install system deps
        run: |
          dnf install -y libX11-devel libxcb-devel libXScrnSaver-devel
          git config --global --add safe.directory '*'

      - name: Install build tools
        run: |
          PY=/opt/python/cp311-cp311/bin/python
          "$PY" -m pip install --upgrade pip build ninja cmake
          echo "PY=$PY" >> "$GITHUB_ENV"
          echo "/opt/python/cp311-cp311/bin" >> "$GITHUB_PATH"

      - name: Cache Dawn (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-linux-${{ hashFiles('DiligentCore/ThirdParty/dawn/CMakeLists.txt', '.gitmodules') }}

      - name: Build packager
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target Diligent-RenderStatePackager

      - name: Stage binary + provenance
        run: |
          BIN="$(find build -name 'Diligent-RenderStatePackager' -type f | head -n1)"
          test -n "$BIN" || { echo "binary not found"; exit 1; }
          mkdir -p src/diligent_drsn_packager/bin
          cp "$BIN" src/diligent_drsn_packager/bin/
          git -C DiligentCore rev-parse HEAD > src/diligent_drsn_packager/diligentcore_sha.txt
          "$BIN" --help || true

      - name: Build wheel
        run: "$PY -m build --wheel"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x64
          path: dist/*.whl
